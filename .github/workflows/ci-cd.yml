name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.41.6'

permissions:
  contents: write

jobs:
  auto-version:
    name: Auto Version Update
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update pubspec.yaml
        run: |
          VERSION=${{ steps.extract.outputs.version }}
          sed -i "s/^version: .*/version: $VERSION/" pubspec.yaml

      - name: Update main.dart
        run: |
          VERSION=${{ steps.extract.outputs.version }}
          sed -i "s/Versão .*/Versão $VERSION/" lib/main.dart

      - name: Update installer.iss
        run: |
          VERSION=${{ steps.extract.outputs.version }}
          sed -i "s/#define MyAppVersion \".*\"/#define MyAppVersion \"$VERSION\"/" installer/installer.iss

      - name: Commit and push version updates
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -A
          git commit -m "chore: Update version to ${{ steps.extract.outputs.version }}" || exit 0
          git push origin ${{ github.ref_name }}

      - name: Update tag to point to new commit
        run: |
          git tag -d ${{ github.ref_name }}
          git push origin :refs/tags/${{ github.ref_name }}
          git tag ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}

  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    needs: auto-version
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: flutter pub get
      - run: flutter analyze

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Create Release folder
        run: |
          New-Item -ItemType Directory -Force -Path Release,Output | Out-Null
          Copy-Item -Path "build\windows\x64\runner\Release\*" -Destination "Release\" -Recurse -Force

      - name: Install Inno Setup
        run: |
          winget install --id JRSoftware.InnoSetup -e --silent --accept-package-agreements --accept-source-agreements --force 2>$null; exit 0

      - name: Create Installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/installer.iss

      - name: Rename installer
        run: |
          $version = "${{ github.ref_name }}"
          Get-ChildItem -Path "Output" -Filter "*.exe" | ForEach-Object { Move-Item -Path $_.FullName -Destination "Equily-Setup-$version.exe" -Force }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: Equily-Setup-*.exe

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Equily-Setup-*.exe
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  shorebird-release:
    name: Shorebird Release
    runs-on: windows-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          version: ${{ env.FLUTTER_VERSION }}

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Create Shorebird Release
        run: shorebird release windows
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

  shorebird-patch:
    name: Shorebird Patch
    runs-on: windows-latest
    needs: shorebird-release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          version: ${{ env.FLUTTER_VERSION }}

      - run: flutter pub get

      - name: Create Shorebird Patch
        run: shorebird patch windows
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
