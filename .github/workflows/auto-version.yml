name: Auto Version Update

on:
  push:
    tags:
      - 'v*'

jobs:
  update-version:
    name: Update Version Files
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update pubspec.yaml
        run: |
          VERSION=${{ steps.extract.outputs.version }}
          sed -i "s/^version: .*/version: $VERSION/" pubspec.yaml

      - name: Update main.dart
        run: |
          VERSION=${{ steps.extract.outputs.version }}
          sed -i "s/Versão .*/Versão $VERSION/" lib/main.dart

      - name: Update installer.iss
        run: |
          VERSION=${{ steps.extract.outputs.version }}
          sed -i "s/#define MyAppVersion \".*\"/#define MyAppVersion \"$VERSION\"/" installer/installer.iss

      - name: Commit version updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Update version to ${{ steps.extract.outputs.version }}"
          file_pattern: "pubspec.yaml lib/main.dart installer/installer.iss"

      - name: Update tag to point to new commit
        run: |
          git tag -d ${{ github.ref_name }}
          git push origin :refs/tags/${{ github.ref_name }}
          git tag ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
